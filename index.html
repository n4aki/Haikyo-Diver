<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廃墟ダイバー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="panel status-panel">
      <div class="status-main">
        <div class="status-row floor-row">
          <span class="status-row-label">FLOOR</span>
          <span id="floorValue" class="status-row-value">1F</span>
        </div>
        <div class="status-row attack-row">
          <span class="status-row-label">攻撃</span>
          <div id="attackModeSummary" class="status-row-content attack-mode-summary">標準攻撃</div>
        </div>
        <div class="status-row">
          <span class="status-row-label">強化</span>
          <div id="upgradeSummary" class="status-row-content upgrade-summary">未取得</div>
        </div>
      </div>
      <div class="status-side">
        <button type="button" id="restartButton" class="restart-button restart-status">RESTART</button>
      </div>
    </header>

    <div id="messageBanner" class="message-banner hidden" aria-live="polite"></div>

    <section class="panel game-panel">
      <div class="game-hud">
        <div class="game-hud-stats">
          <div class="hud-stat-card">
            <div class="hud-stat-line">
              <span class="hud-label">HP</span>
              <span id="hpValue" class="hud-value">0 / 0</span>
            </div>
            <div class="hud-meter hud-meter-block" aria-hidden="true">
              <div id="hpBar" class="meter-fill hp-fill"></div>
            </div>
          </div>
          <div class="hud-stat-card">
            <div class="hud-stat-line">
              <span class="hud-label">O2</span>
              <span id="oxygenValue" class="hud-value">0 / 0</span>
            </div>
            <div class="hud-meter hud-meter-block" aria-hidden="true">
              <div id="oxygenBar" class="meter-fill oxygen-fill"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="mapStage" class="map-stage">
        <div id="map" class="map" aria-label="ゲームマップ"></div>
        <div id="actorLayer" class="actor-layer" aria-hidden="true"></div>
        <div id="floorIntroOverlay" class="floor-intro-overlay hidden" aria-hidden="true"></div>
        <div class="log-strip map-log-strip">
          <div id="log" class="log" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <section id="controlPanel" class="panel control-panel">
      <div class="controls" aria-label="移動ボタン">
        <button type="button" class="control-button dir-button" data-action="up" aria-label="上へ移動">
          <span class="dir-icon">↑</span>
        </button>
        <div class="middle-controls">
          <button type="button" class="control-button dir-button" data-action="left" aria-label="左へ移動">
            <span class="dir-icon">←</span>
          </button>
          <button type="button" class="control-button wait-button" data-action="wait" aria-label="待機">
            <span class="wait-label">待機</span>
          </button>
          <button type="button" class="control-button dir-button" data-action="right" aria-label="右へ移動">
            <span class="dir-icon">→</span>
          </button>
        </div>
        <button type="button" class="control-button dir-button" data-action="down" aria-label="下へ移動">
          <span class="dir-icon">↓</span>
        </button>
      </div>
      <p class="control-help">PC: 矢印キー / WASD / スペースで待機</p>
    </section>
  </main>

  <section id="upgradeOverlay" class="upgrade-overlay hidden" aria-live="polite">
    <div class="panel upgrade-modal">
      <div class="upgrade-overlay-head">
        <h2 id="upgradeTitle">アップグレードを選択</h2>
        <p>1つ選ぶと次のフロアへ進みます。</p>
      </div>
      <div id="upgradeChoices" class="upgrade-choices"></div>
    </div>
  </section>

  <section id="gameOverOverlay" class="game-over-overlay hidden" aria-live="assertive">
    <div class="panel game-over-modal">
      <h2>ゲームオーバー</h2>
      <p id="gameOverText">酸素とHPを管理しながら生き延びよう。</p>
      <button type="button" id="gameOverRestartButton" class="restart-button game-over-restart">RESTART</button>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
